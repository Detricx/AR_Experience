<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trailer AR + Viv'O Baile</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body{
            margin:0;
            overflow:hidden;
            font-family:Arial;
        }
        .a-enter-vr, .a-enter-ar, .vr-button { 
            display: none !important; 
        }
    </style>
</head>
<body>
    <a-scene 
        mindar-image="imageTargetSrc: https://raw.githubusercontent.com/Detricx/AR_Experience/main/targets.mind; autoStart: true;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        xr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <video 
                id="trailer" 
                src="./assets/ProjectDC/trailer1.mp4" 
                loop="true" 
                muted="true" 
                playsinline="true"
                preload="auto"
                crossorigin="anonymous">
            </video>

            <a-asset-item id="mic" src="assets/ProjectIVB/3D/Microphone.glb"></a-asset-item>
            <a-asset-item id="guitar" src="assets/ProjectIVB/3D/Electric guitar.glb"></a-asset-item>
            <a-asset-item id="keyboard" src="assets/ProjectIVB/3D/Keyboard.glb"></a-asset-item>
            <a-asset-item id="drums" src="assets/ProjectIVB/3D/Drum Kit.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false">
            <!-- Cursor para interação mobile -->
            <a-cursor
                fuse="false"
                raycaster="objects: .clickable; far: 1000">
            </a-cursor>
        </a-camera>

        <!-- Trailer Video -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video 
                src="#trailer"
                width="1.2" 
                height="0.675" 
                position="0 0.45 0.15" 
                rotation="0 0 0"
                autoplay="true" 
                loop="true"
                muted="true"
                playsinline="true">
            </a-video>
        </a-entity>

        <!-- VIV'O BAILE  -->
        <a-entity mindar-image-target="targetIndex: 1">

            <!-- MENU PRINCIPAL (sempre visível no início) -->
            <a-entity id="main-menu" position="0 0.8 0">

                <!-- BOTÃO 1: BANDA -->
                <a-plane 
                    id="btn-banda" 
                    class="clickable"
                    color="#44aa00" 
                    height="0.25" 
                    width="1.2" 
                    position="0 0 0.05"
                    material="shader: flat; color: #44aa00; side: double; opacity: 0.95;"></a-plane>
                    <a-text value="🎤 Banda" aligns="center" color="black" position="0 0 0.02" width="2.2"></a-text>
                </a-plane>

                <!-- BOTÃO 2: MICROFONE -->
                <a-plane 
                    id="btn-mic" 
                    class="clickable"
                    color="#44aa00"
                    height="0.25" 
                    width="1.2" 
                    position="0 -0.35 0.05"
                    material="shader: flat; color: #44aa00; side: double; opacity: 0.95;">

                    <a-text value="🎤 Microfone" aligns="center" color="black" position="0 0 0.02" width="2.2"></a-text>
                </a-plane>

                <!-- BOTÃO 3: GUITARRA -->
                <a-plane 
                    id="btn-guitar" 
                    class="clickable"
                    color="#44aa00"
                    height="0.25"
                    width="1.2" 
                    position="0 -0.70 0.05"
                    material="shader: flat; color: #44aa00; side: double; opacity: 0.95;">

                    <a-text value="🎸 Guitarra" aligns="center" color="black" position="0 0 0.02" width="2.2"></a-text>
                </a-plane>

                <!-- BOTÃO 4: BATERIA -->
                <a-plane 
                    id="btn-drums" 
                    class="clickable"
                    color="#44aa00" 
                    height="0.25" 
                    width="1.2" 
                    position="0 -1.05 0.05"
                    material="shader: flat; color: #44aa00; side: double; opacity: 0.95;">

                    <a-text value="🥁 Bateria" aligns="center" color="black" position="0 0 0.02" width="2.2"></a-text>
                </a-plane>

            </a-entity>

            <!-- CONTEÚDOS INDIVIDUAIS (começam escondidos e aparecem ao selecionar) -->

            <!-- BANDA (info) -->
            <a-entity id="section-banda" visible="false">
                <a-text value="Os Viv'O Baile\nMúsica de baile e animação" aligns="center" color="yellow" position="0 1.4 0" width="3"></a-text>
                <a-text value="Email: contacto@vivo-baile.pt\nTel: 912345678" aligns="center" color="white" position="0 -1.3 0" width="3"></a-text>
            </a-entity>

            <!-- MICROFONE -->
            <a-entity id="section-mic" visible="false">
                <a-gltf-model src="#mic" position="0 0.3 0" scale="0.25 0.25 0.25"></a-gltf-model>
            </a-entity>

            <!-- GUITARRA -->
            <a-entity id="section-guitar" visible="false">
                <a-gltf-model src="#guitar" position="0 0.2 0" scale="0.35 0.35 0.35" rotation="0 20 0"></a-gltf-model>
            </a-entity>

            <!-- BATERIA -->
            <a-entity id="section-drums" visible="false">
                <a-gltf-model src="#drums" position="0 0.1 -0.2" scale="0.28 0.28 0.28"></a-gltf-model>
                <a-gltf-model src="#keyboard" position="0.8 0.1 -0.4" scale="0.22 0.22 0.22"></a-gltf-model>
            </a-entity>

            <!-- BOTÃO VOLTAR (comum a todas as secções) -->
            <a-plane 
                id="btn-voltar" 
                class="clickable" 
                visible="false"
                color="#9C132C" 
                height="0.2" 
                width="0.8" 
                position="0 -1.6 0"
                material="shader: flat; color: #9C132C; side: double; opacity: 0.95;">

                <a-text value="⬅️ Voltar ao Menu" aligns="center" color="white" position="0 0 0.02" width="1.8"></a-text>
            </a-plane>
        </a-entity>
    </a-scene>

    <!-- Script para forçar o autoplay quando o poster é detetado -->
    <script>
        // Project 1 - TRAILER AR
        const scene = document.querySelector('a-scene');
        const video = document.getElementById('trailer');

        scene.addEventListener('targetFound', () => {
            console.log('✅ Poster detetado - a reproduzir trailer');
            video.play().catch(err => console.log('Erro autoplay:', err));
        });

        // Opcional: para quando afastares o poster
        scene.addEventListener('targetLost', () => {
            video.pause();
        });

        // Project 2 - VIV'O BAILE
        const menu = document.getElementById('main-menu');
        const voltar = document.getElementById('btn-voltar');

        const sections = {
            banda:  document.getElementById('section-banda'),
            mic:    document.getElementById('section-mic'),
            guitar: document.getElementById('section-guitar'),
            drums:  document.getElementById('section-drums')
        };

        function showSection(sectionId) {
            menu.setAttribute('visible', 'false');
            voltar.setAttribute('visible', 'true');
            Object.keys(sections).forEach(key => {
            sections[key].setAttribute('visible', key === sectionId ? 'true' : 'false');
            });
        }

        function backToMenu() {
            menu.setAttribute('visible', 'true');
            voltar.setAttribute('visible', 'false');
            Object.keys(sections).forEach(key => {
            sections[key].setAttribute('visible', 'false');
            });
        }

        // Esperar que o MindAR/A-Frame carregue completamente para garantir que os elementos estão disponíveis
        const sceneEl = document.querySelector('a-scene');
        
        sceneEl.addEventListener('loaded', () => {
            // Cliques nos botões do menu
            document.getElementById('btn-banda').addEventListener('click', () => showSection('banda'));
            document.getElementById('btn-mic').addEventListener('click', () => showSection('mic'));
            document.getElementById('btn-guitar').addEventListener('click', () => showSection('guitar'));
            document.getElementById('btn-drums').addEventListener('click', () => showSection('drums'));

            // Botão Voltar
            voltar.addEventListener('click', backToMenu);
        });
    </script>
</body>
</html>
