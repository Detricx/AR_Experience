<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trailer AR</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene 
    mindar-image="imageTargetSrc: https://github.com/Detricx/AR_Experience/blob/main/targets.mind; autoStart: true;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="trailer" src="./assets/trailer1.mp4" loop="true"></video>
    </a-assets>

    <!-- Câmara -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- TARGET: O poster do filme -->
    <a-entity mindar-image-target="targetIndex: 0">
      
      <!-- Plano base do poster (debug - podes apagar depois) -->
      <a-plane 
        src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png" 
        position="0 0 0" 
        width="1" 
        height="0.552" 
        rotation="0 0 0">
      </a-plane>

      <!-- TRAILER aparece flutuando à frente do poster -->
      <a-video 
        src="#trailer"
        width="1.2" 
        height="0.675" 
        position="0 0.4 0.1" 
        rotation="0 0 0"
        autoplay="true" 
        loop="true">
      </a-video>

    </a-entity>
  </a-scene>
</body>
</html>
