<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trailer AR + Viv'O Baile</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body{
            margin:0;
            overflow:hidden;
            font-family:Arial;
        }
        .a-enter-vr, .a-enter-ar, .vr-button { 
            display: none !important; 
        }
    </style>
</head>
<body>
    <a-scene 
        mindar-image="imageTargetSrc: https://raw.githubusercontent.com/Detricx/AR_Experience/main/targets.mind; autoStart: true;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        xr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <video 
                id="trailer" 
                src="./assets/ProjectDC/trailer1.mp4" 
                loop="true" 
                muted="true" 
                playsinline="true"
                preload="auto"
                crossorigin="anonymous">
            </video>

            <a-asset-item id="mic" src="assets/ProjectIVB/3D/Microphone.glb"></a-asset-item>
            <a-asset-item id="guitar" src="assets/ProjectIVB/3D/Electric guitar.glb"></a-asset-item>
            <a-asset-item id="keyboard" src="assets/ProjectIVB/3D/Keyboard.glb"></a-asset-item>
            <a-asset-item id="drums" src="assets/ProjectIVB/3D/Drum Kit.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Trailer Video -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video 
                src="#trailer"
                width="1.2" 
                height="0.675" 
                position="0 0.45 0.15" 
                rotation="0 0 0"
                autoplay="true" 
                loop="true"
                muted="true"
                playsinline="true">
            </a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <!-- MICROFONE -->
            <a-gltf-model 
                src="#mic"
                position="0 0.4 -0.3"
                scale="0.12 0.12 0.12">
            </a-gltf-model>

            <!-- GUITARRA -->
            <a-gltf-model
                src="#guitar"
                position="1 0 -0.5"
                scale="0.18 0.18 0.18">
            </a-gltf-model>

            <!-- TECLADO -->
            <a-gltf-model
                src="#keyboard"
                position="-1 0 -0.5"
                scale="0.18 0.18 0.18">
            </a-gltf-model>

            <!-- BATERIA -->
            <a-gltf-model
                src="#drums"
                position="0 -0.5 -0.8"
                scale="0.15 0.15 0.15">
            </a-gltf-model>

            <!-- MENU PRINCIPAL -->
            <a-entity position="0 0.8 0">

            <!-- BOTÃO BANDA -->
            <a-plane
                color="#44aa00"
                height="0.25"
                width="1"
                position="0 0 0"
                class="clickable"
                material="shader: flat; color: #44aa00; side: double; opacity: 0.9; roughness:0.5;">

                <a-ring
                    color="#ffffff"
                    radius-inner="0.53"
                    radius-outer="0.55"
                    position="0 0 0.01">
                </a-ring>

                <a-text
                    value="🎤 Banda"
                    aligns="center"
                    color="black"
                    position="0 0 0.02"
                    width="2">
                </a-text>
            </a-plane>

            <!-- BOTÃO MÚSICOS -->
            <a-plane
                color="#44aa00"
                height="0.25"
                width="1"
                position="0 -0.35 0"
                class="clickable"
                material="shader: flat; color: #44aa00; side: double; opacity: 0.9; roughness:0.5;">
                
                <a-ring
                    color="#ffffff"
                    radius-inner="0.53"
                    radius-outer="0.55"
                    position="0 0 0.01">
                </a-ring>

                <a-text
                    value="🎸 Musicos"
                    aligns="center"
                    color="black"
                    position="0 -0.35 0.02"
                    width="2">
                </a-text>
            </a-plane>

            <!-- BOTÃO CONTACTOS -->
            <a-plane
                color="#44aa00"
                height="0.25"
                width="1"
                position="0 -0.7 0"
                class="clickable"
                material="shader: flat; color: #44aa00; side: double; opacity: 0.9; roughness:0.5;">
                
                <a-ring
                    color="#ffffff"
                    radius-inner="0.53"
                    radius-outer="0.55"
                    position="0 0 0.01">
                </a-ring>

                <a-text
                    value="📞 Contactos"
                    aligns="center"
                    color="black"
                    position="0 -0.7 0.02"
                    width="2">
                </a-text>
            </a-plane>

            <!-- INFORMAÇÃO BANDA -->
            <a-text
                value="Os Viv'O Baile\nMusica de baile e animacao"
                aligns="center"
                color="yellow"
                position="0 1.4 0"
                width="3">
            </a-text>

            <!-- CONTACTOS -->
            <a-text
                value="Email: contacto@vivo-baile.pt\nTel: 912345678"
                aligns="center"
                color="white"
                position="0 -1 0"
                width="3">
            </a-text>
        </a-entity>
    </a-scene>

    <!-- Script para forçar o autoplay quando o poster é detetado -->
    <script>
        const scene = document.querySelector('a-scene');
        const video = document.getElementById('trailer');

        scene.addEventListener('targetFound', () => {
            console.log('✅ Poster detetado - a reproduzir trailer');
            video.play().catch(err => console.log('Erro autoplay:', err));
        });

        // Opcional: para quando afastares o poster
        scene.addEventListener('targetLost', () => {
            video.pause();
        });
    </script>
</body>
</html>
