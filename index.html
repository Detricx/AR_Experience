<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trailer AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        .a-enter-vr, .a-enter-ar, .vr-button { 
            display: none !important; 
        }
    </style>
</head>
<body>
    <a-scene 
        mindar-image="imageTargetSrc: https://raw.githubusercontent.com/Detricx/AR_Experience/main/targets.mind; autoStart: true;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <video 
                id="trailer" 
                src="./assets/trailer1.mp4" 
                loop="true" 
                muted="true" 
                playsinline="true"
                crossorigin="anonymous">
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- DEBUG: Caixa vermelha que deve aparecer quando o tracking funcionar -->
            <a-box position="0 0.2 0.1" scale="0.3 0.3 0.3" color="red" material="transparent: true; opacity: 0.8"></a-box>

            <!-- Video do Trailer -->
            <a-video 
                src="#trailer"
                width="1.2" 
                height="0.675" 
                position="0 0.45 0.15" 
                rotation="0 0 0"
                autoplay="true" 
                loop="true"
                muted="true"
                playsinline="true">
            </a-video>
        </a-entity>
    </a-scene>
</body>
</html>
