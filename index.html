<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trailer AR</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene 
    mindar-image="imageTargetSrc: https://raw.githubusercontent.com/Detricx/AR_Experience/main/targets.mind; autoStart: true;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="trailer" src="./assets/trailer1.mp4" loop="true" crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      
      <!-- Plano debug (podes apagar depois) -->
      <a-plane 
        position="0 0 0" 
        width="1" 
        height="0.552" 
        rotation="0 0 0"
        material="color: #222222; transparent: true; opacity: 0.1">
      </a-plane>

      <!-- O teu trailer 3D -->
      <a-video 
        src="#trailer"
        width="1.2" 
        height="0.675" 
        position="0 0.45 0.15" 
        rotation="0 0 0"
        autoplay="true" 
        loop="true">
      </a-video>

    </a-entity>
  </a-scene>
</body>
</html>
